name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Regenerate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.3-bin.zip -d /tmp
          cd android && /tmp/gradle-8.3/bin/gradle wrapper --gradle-version 8.3

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bondly-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
