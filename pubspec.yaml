name: bondly
description: Bondly — the social app built for real connection.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  crypto: ^3.0.3
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
